# ============================================================================
# CI/CD: Next.js App → Azure App Service (Standalone Mode)
# ============================================================================
# Repo: strug-landing-page
#
# IMPORTANT: next.config.mjs must have: output: 'standalone'
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID       — App Registration client ID (OIDC)
#   AZURE_TENANT_ID       — Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID — Azure subscription ID
# ============================================================================

name: Deploy Next.js

on:
  push:
    branches: [staging, main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20'
  STAGING_APP_NAME: 'app-strug-staging-landing'
  STAGING_RG: 'rg-strug-staging'
  PRODUCTION_APP_NAME: 'app-strug-prod-landing'
  PRODUCTION_RG: 'rg-strug-prod'

jobs:
  # ─── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (standalone)
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/.next/static
          # Copy standalone server
          cp -r .next/standalone/* deploy/
          # Copy static assets (not included in standalone)
          cp -r .next/static deploy/.next/
          # Copy public folder if it exists
          if [ -d "public" ]; then cp -r public deploy/; fi
          # Create ZIP
          cd deploy && zip -r ../deploy.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-${{ github.sha }}
          path: deploy.zip
          retention-days: 3

  # ─── Deploy to Staging ─────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    if: github.ref == 'refs/heads/staging'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-${{ github.sha }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/cli@v2
        timeout-minutes: 10
        with:
          inlineScript: |
            az webapp deploy \
              --resource-group ${{ env.STAGING_RG }} \
              --name ${{ env.STAGING_APP_NAME }} \
              --src-path deploy.zip \
              --type zip \
              --async true

      - name: Health check
        run: |
          echo "⏳ Waiting 60s for app startup..."
          sleep 60
          echo "🔍 Running health check..."
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 \
              "https://${{ env.STAGING_APP_NAME }}.azurewebsites.net") || true
            echo "  Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "404" ]; then
              echo "✅ App is responding!"
              exit 0
            fi
            sleep 15
          done
          echo "⚠️ Health check did not get a response — check Azure logs"

  # ─── Deploy to Production ──────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-${{ github.sha }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/cli@v2
        timeout-minutes: 10
        with:
          inlineScript: |
            az webapp deploy \
              --resource-group ${{ env.PRODUCTION_RG }} \
              --name ${{ env.PRODUCTION_APP_NAME }} \
              --src-path deploy.zip \
              --type zip \
              --async true
