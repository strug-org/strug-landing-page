# ============================================================================
# CI/CD: Next.js App → Azure App Service (Standalone Mode)
# ============================================================================
# Repo: strug-landing-page
#
# IMPORTANT: next.config.mjs must have: output: 'standalone'
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID       — App Registration client ID (OIDC)
#   AZURE_TENANT_ID       — Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID — Azure subscription ID
# ============================================================================

name: Deploy Next.js

on:
  push:
    branches: [staging, main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20'
  STAGING_APP_NAME: 'app-strug-staging-landing'
  STAGING_RG: 'rg-strug-staging'
  PRODUCTION_APP_NAME: 'app-strug-prod-landing'
  PRODUCTION_RG: 'rg-strug-prod'

jobs:
  # ─── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (standalone)
        run: npm run build

      - name: Prepare deployment package
        run: |
          set -euo pipefail
          mkdir -p deploy

          # Copy the full standalone tree (server.js, .next/, node_modules/, package.json)
          # Using `/.` syntax copies the CONTENTS of standalone into deploy, avoiding
          # the ambiguity of `cp -r src/* dest/` when dest already has same-named dirs.
          cp -a .next/standalone/. deploy/

          # Remove the standalone package.json so Kudu's optimizer doesn't try to
          # reinstall over our pruned node_modules.
          rm -f deploy/package.json

          # Add static assets (standalone build doesn't include these).
          cp -a .next/static deploy/.next/

          # Add public folder if present.
          if [ -d "public" ]; then cp -a public deploy/; fi

          # Fail fast if any required file is missing — otherwise the error only shows
          # up in the Azure container log as "Could not find a production build".
          echo "=== Verifying deploy package ==="
          for path in \
            server.js \
            .next/BUILD_ID \
            .next/required-server-files.json \
            .next/server \
            .next/static \
            node_modules/next; do
            if [ -e "deploy/$path" ]; then
              echo "  ✓ deploy/$path"
            else
              echo "  ✗ MISSING: deploy/$path"
              echo "Contents of deploy/:"
              ls -la deploy/ || true
              echo "Contents of deploy/.next/:"
              ls -la deploy/.next/ || true
              exit 1
            fi
          done

          # Zip the package (-q quiet, -y preserves symlinks inside node_modules).
          cd deploy && zip -qry ../deploy.zip . -x "*.DS_Store"
          cd ..
          echo "=== deploy.zip size ==="
          ls -lh deploy.zip
          # Diagnostics — don't let SIGPIPE from head(1) fail the build.
          set +o pipefail
          unzip -l deploy.zip | awk '{print $4}' > /tmp/zip-entries.txt
          echo "=== deploy.zip top-level entries ==="
          awk -F/ '{print $1}' /tmp/zip-entries.txt | sort -u | sed '/^$/d' | head -30
          echo "=== deploy.zip .next/ entries (first 20) ==="
          grep -E '^\.next/' /tmp/zip-entries.txt | head -20
          echo "=== .next/ entry count in zip ==="
          grep -Ec '^\.next/' /tmp/zip-entries.txt
          set -o pipefail

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-${{ github.sha }}
          path: deploy.zip
          retention-days: 3

  # ─── Deploy to Staging ─────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    if: github.ref == 'refs/heads/staging'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-${{ github.sha }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure App Service
        uses: azure/cli@v2
        with:
          inlineScript: |
            # Pin Linux runtime to Node 20 LTS and set the Next.js standalone entry point
            az webapp config set \
              --resource-group ${{ env.STAGING_RG }} \
              --name ${{ env.STAGING_APP_NAME }} \
              --startup-file "node server.js" \
              --linux-fx-version "NODE|20-lts"
            # HOSTNAME=0.0.0.0 is critical: Azure sets HOSTNAME to the FQDN by default,
            # which Next.js standalone server.js then tries to bind to and fails.
            az webapp config appsettings set \
              --resource-group ${{ env.STAGING_RG }} \
              --name ${{ env.STAGING_APP_NAME }} \
              --settings \
                SCM_DO_BUILD_DURING_DEPLOYMENT=false \
                ENABLE_ORYX_BUILD=false \
                NODE_ENV=production \
                HOSTNAME=0.0.0.0
            # Enable filesystem logging so container stdout/stderr is retrievable
            az webapp log config \
              --resource-group ${{ env.STAGING_RG }} \
              --name ${{ env.STAGING_APP_NAME }} \
              --application-logging filesystem \
              --docker-container-logging filesystem \
              --level information

      - name: Wait for app settings to propagate
        run: sleep 20

      - name: Deploy to App Service
        uses: azure/cli@v2
        timeout-minutes: 20
        with:
          inlineScript: |
            # --clean true wipes /home/site/wwwroot before extraction, removing any
            # stale oryx-manifest.toml or node_modules state from previous deploys.
            # --async false (default) lets the CLI poll until done so we get a real
            # success/failure exit code; combined with the appsettings already set to
            # SCM_DO_BUILD_DURING_DEPLOYMENT=false this should skip the Oryx build.
            az webapp deploy \
              --resource-group ${{ env.STAGING_RG }} \
              --name ${{ env.STAGING_APP_NAME }} \
              --src-path deploy.zip \
              --type zip \
              --clean true \
              --restart true

      - name: Inspect wwwroot on failure
        if: failure()
        uses: azure/cli@v2
        with:
          inlineScript: |
            set +e
            echo "=== Listing /home/site/wwwroot via Kudu VFS API ==="
            TOKEN=$(az account get-access-token --resource https://management.azure.com/ --query accessToken -o tsv)
            BASE="https://${{ env.STAGING_APP_NAME }}.scm.azurewebsites.net/api/vfs/site/wwwroot"
            echo "-- Top-level --"
            curl -sSL -H "Authorization: Bearer $TOKEN" "$BASE/" \
              | python3 -c "import sys, json; [print(f\"{'d' if e['mime']=='inode/directory' else 'f'} {e['size']:>10}  {e['name']}\") for e in json.load(sys.stdin)]" 2>/dev/null || echo "(failed to list)"
            echo ""
            echo "-- .next/ --"
            curl -sSL -H "Authorization: Bearer $TOKEN" "$BASE/.next/" \
              | python3 -c "import sys, json; [print(f\"{'d' if e['mime']=='inode/directory' else 'f'} {e['size']:>10}  {e['name']}\") for e in json.load(sys.stdin)]" 2>/dev/null || echo "(.next/ missing or inaccessible)"

      - name: Dump container logs on failure
        if: failure()
        uses: azure/cli@v2
        with:
          inlineScript: |
            set +e
            echo "=== Downloading Azure App Service logs ==="
            az webapp log download \
              --resource-group ${{ env.STAGING_RG }} \
              --name ${{ env.STAGING_APP_NAME }} \
              --log-file azure-logs.zip
            if [ -f azure-logs.zip ]; then
              mkdir -p azure-logs
              python3 -c "import zipfile; zipfile.ZipFile('azure-logs.zip').extractall('azure-logs')"
              echo ""
              echo "=== default_docker.log (last 300 lines) ==="
              find azure-logs -name "*default_docker*.log" -exec tail -n 300 {} \;
              echo ""
              echo "=== All docker logs (last 150 lines each) ==="
              find azure-logs -type f -name "*docker*.log" | while read -r f; do
                echo "--- $f ---"
                tail -n 150 "$f"
              done
            fi

      - name: Upload Azure logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: azure-logs-staging-${{ github.sha }}
          path: azure-logs.zip
          if-no-files-found: ignore
          retention-days: 7

      - name: Health check
        run: |
          echo "⏳ Waiting 60s for app startup..."
          sleep 60
          echo "🔍 Running health check..."
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 \
              "https://${{ env.STAGING_APP_NAME }}.azurewebsites.net") || true
            echo "  Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "404" ]; then
              echo "✅ App is responding!"
              exit 0
            fi
            sleep 15
          done
          echo "⚠️ Health check did not get a response — check Azure logs"

  # ─── Deploy to Production ──────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-${{ github.sha }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure App Service
        uses: azure/cli@v2
        with:
          inlineScript: |
            # Pin Linux runtime to Node 20 LTS and set the Next.js standalone entry point
            az webapp config set \
              --resource-group ${{ env.PRODUCTION_RG }} \
              --name ${{ env.PRODUCTION_APP_NAME }} \
              --startup-file "node server.js" \
              --linux-fx-version "NODE|20-lts"
            # HOSTNAME=0.0.0.0 is critical: Azure sets HOSTNAME to the FQDN by default,
            # which Next.js standalone server.js then tries to bind to and fails.
            az webapp config appsettings set \
              --resource-group ${{ env.PRODUCTION_RG }} \
              --name ${{ env.PRODUCTION_APP_NAME }} \
              --settings \
                SCM_DO_BUILD_DURING_DEPLOYMENT=false \
                ENABLE_ORYX_BUILD=false \
                NODE_ENV=production \
                HOSTNAME=0.0.0.0
            # Enable filesystem logging so container stdout/stderr is retrievable
            az webapp log config \
              --resource-group ${{ env.PRODUCTION_RG }} \
              --name ${{ env.PRODUCTION_APP_NAME }} \
              --application-logging filesystem \
              --docker-container-logging filesystem \
              --level information

      - name: Wait for app settings to propagate
        run: sleep 20

      - name: Deploy to App Service
        uses: azure/cli@v2
        timeout-minutes: 20
        with:
          inlineScript: |
            # --clean true wipes /home/site/wwwroot before extraction, removing any
            # stale oryx-manifest.toml or node_modules state from previous deploys.
            az webapp deploy \
              --resource-group ${{ env.PRODUCTION_RG }} \
              --name ${{ env.PRODUCTION_APP_NAME }} \
              --src-path deploy.zip \
              --type zip \
              --clean true \
              --restart true

      - name: Inspect wwwroot on failure
        if: failure()
        uses: azure/cli@v2
        with:
          inlineScript: |
            set +e
            echo "=== Listing /home/site/wwwroot via Kudu VFS API ==="
            TOKEN=$(az account get-access-token --resource https://management.azure.com/ --query accessToken -o tsv)
            BASE="https://${{ env.PRODUCTION_APP_NAME }}.scm.azurewebsites.net/api/vfs/site/wwwroot"
            echo "-- Top-level --"
            curl -sSL -H "Authorization: Bearer $TOKEN" "$BASE/" \
              | python3 -c "import sys, json; [print(f\"{'d' if e['mime']=='inode/directory' else 'f'} {e['size']:>10}  {e['name']}\") for e in json.load(sys.stdin)]" 2>/dev/null || echo "(failed to list)"
            echo ""
            echo "-- .next/ --"
            curl -sSL -H "Authorization: Bearer $TOKEN" "$BASE/.next/" \
              | python3 -c "import sys, json; [print(f\"{'d' if e['mime']=='inode/directory' else 'f'} {e['size']:>10}  {e['name']}\") for e in json.load(sys.stdin)]" 2>/dev/null || echo "(.next/ missing or inaccessible)"

      - name: Dump container logs on failure
        if: failure()
        uses: azure/cli@v2
        with:
          inlineScript: |
            set +e
            echo "=== Downloading Azure App Service logs ==="
            az webapp log download \
              --resource-group ${{ env.PRODUCTION_RG }} \
              --name ${{ env.PRODUCTION_APP_NAME }} \
              --log-file azure-logs.zip
            if [ -f azure-logs.zip ]; then
              mkdir -p azure-logs
              python3 -c "import zipfile; zipfile.ZipFile('azure-logs.zip').extractall('azure-logs')"
              echo ""
              echo "=== default_docker.log (last 300 lines) ==="
              find azure-logs -name "*default_docker*.log" -exec tail -n 300 {} \;
              echo ""
              echo "=== All docker logs (last 150 lines each) ==="
              find azure-logs -type f -name "*docker*.log" | while read -r f; do
                echo "--- $f ---"
                tail -n 150 "$f"
              done
            fi

      - name: Upload Azure logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: azure-logs-production-${{ github.sha }}
          path: azure-logs.zip
          if-no-files-found: ignore
          retention-days: 7

      - name: Health check
        run: |
          echo "⏳ Waiting 60s for app startup..."
          sleep 60
          echo "🔍 Running health check..."
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 \
              "https://${{ env.PRODUCTION_APP_NAME }}.azurewebsites.net") || true
            echo "  Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "404" ]; then
              echo "✅ App is responding!"
              exit 0
            fi
            sleep 15
          done
          echo "⚠️ Health check did not get a response — check Azure logs"
